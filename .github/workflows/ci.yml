# FXDE v5.1 — CI Pipeline
# 参照: SPEC_v51_part5 §10.5
#
# Jobs:
#   typecheck  — api + web tsc --noEmit
#   lint       — ESLint
#   build      — api + web production build
#
# Triggers: push / pull_request → main / develop

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  # ── typecheck ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (types / config / ui)
        run: |
          pnpm --filter @fxde/config build
          pnpm --filter @fxde/types build
          pnpm --filter @fxde/ui build

      - name: Generate Prisma client
        run: pnpm --filter @fxde/api exec prisma generate --schema=../../prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://fxde:fxde_pass@localhost:5432/fxde_test

      - name: typecheck api
        run: pnpm --filter @fxde/api exec tsc --noEmit

      - name: typecheck web
        run: pnpm --filter @fxde/web exec tsc --noEmit

  # ── lint ───────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # ── build ──────────────────────────────────────────────────────────────────
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @fxde/config build
          pnpm --filter @fxde/types build
          pnpm --filter @fxde/ui build

      - name: Generate Prisma client
        run: pnpm --filter @fxde/api exec prisma generate --schema=../../prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://fxde:fxde_pass@localhost:5432/fxde_test

      - name: Build api
        run: pnpm --filter @fxde/api build

      - name: Build web
        run: pnpm --filter @fxde/web build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7s