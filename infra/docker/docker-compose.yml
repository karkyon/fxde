# FXDE v5.1 — Docker Compose
# Phase2 用インフラ骨格
#
# Port マッピング（前回失敗対策）:
#   Postgres: host:5436 → container:5432
#   Redis:    host:6386 → container:6379
#
# Phase2 では api / web コンテナは起動しない（Phase3/4 で実装後に有効化）

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fxde_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fxde
      POSTGRES_PASSWORD: fxde_password
      POSTGRES_DB: fxde_db
    ports:
      - "5436:5432"
    volumes:
      - fxde_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxde -d fxde_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fxde_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    ports:
      - "6386:6379"
    volumes:
      - fxde_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # api:  # Phase3 完了後に有効化
  #   build:
  #     context: ../../
  #     dockerfile: apps/api/Dockerfile
  #   container_name: fxde_api
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: postgresql://fxde:fxde_password@postgres:5432/fxde_db
  #     REDIS_URL: redis://redis:6379
  #     REDIS_PORT: 6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # web:  # Phase4 完了後に有効化
  #   build:
  #     context: ../../
  #     dockerfile: apps/web/Dockerfile
  #   container_name: fxde_web
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - api

volumes:
  fxde_postgres_data:
  fxde_redis_data:
