version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fxde_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fxde
      POSTGRES_PASSWORD: fxde_password
      POSTGRES_DB: fxde_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fxde -d fxde_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fxde_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (NestJS) ────────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: fxde_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://fxde:fxde_password@postgres:5432/fxde_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_in_production}
      JWT_EXPIRES_IN: 7d
      API_PORT: 3000
    ports:
      - '3000:3000'

  # ─── Web (React/Vite) ────────────────────────────────────────
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    container_name: fxde_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    ports:
      - '5173:80'

volumes:
  postgres_data:
  redis_data:
